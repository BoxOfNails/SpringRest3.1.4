<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Information Page</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="page-header  text-bg-dark">
    <div class="row" >
        <div class="col-md-6 align-self-center ps-4">
            <span th:text="${#ctx.session.user.email}"/>
            <span>with roles</span>
            <span th:each="role,iterStat : ${#ctx.session.user.roles}"
                  th:text="${#strings.replace(role, 'ROLE_', '')} + ${!iterStat.last ? ', ' : ''}"></span>
        </div>
        <div class="text-end col-md-6">
            <form action="#" th:action="@{/logout}" method="POST">

                <input type="submit" class="btn btn-link link-secondary link-underline link-underline-opacity-0" value="Logout"/>

            </form>
        </div>
    </div>
</div>
<div class="row pt-3">
    <div class="col-md-2">
        <nav class="nav nav-pills flex-column">
            <div sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" href="#" th:href="@{/admin/list}">Admin</a>
            </div>
            <a class="nav-link active" aria-current="page" href="#">User</a>
        </nav>
    </div>
    <div class="col-md-8">
        <h3>User Information Page</h3>
        <hr>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${#ctx.session.user.id}" />
                <td th:text="${#ctx.session.user.firstName}" />
                <td th:text="${#ctx.session.user.lastName}" />
                <td th:text="${#ctx.session.user.email}" />
                <td>
                    <span th:each="role,iterStat : ${#ctx.session.user.roles}"
                          th:text="${#strings.replace(role, 'ROLE_', '')} + ${!iterStat.last ? ', ' : ''}"></span>
                </td>
            </tr>
            </tbody>

        </table>
    </div>
</div>
<hr>
</body>
</html>
